name: Deploy ARQ to Beget Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/arq
            echo 'Starting deployment...'
            git stash
            git reset --hard HEAD
            git clean -fd
            git pull origin main
                rm -rf node_modules
                rm -f package-lock.json
            npm install --production=false
                        chmod +x node_modules/.bin/*
                            pm2 kill
                   npm run build
            sleep 2
            pm2 start dist/main.js --name "arq-backend" --cwd /opt/arq
            pm2 save
            sudo systemctl reload nginx
                pm2 logs arq-backend --lines 20 --nostream
                echo '=== Backend Health Check ==='
                curl -I http://localhost:8000 || echo 'Backend not responding'
                echo '=== Nginx Config Check ==='
                nginx -t || echo 'Nginx config invalid'
                echo '=== Nginx Error Log (last 10 lines) ==='
                tail -10 /var/log/nginx/error.log || echo 'Cannot read nginx error log'
                echo '=== Nginx Server Config ==='
                cat /etc/nginx/sites-enabled/arq-ai.ru 2>/dev/null || cat /etc/nginx/sites-enabled/default 2>/dev/null || echo 'Config not found'
            echo 'Deployment completed!'
