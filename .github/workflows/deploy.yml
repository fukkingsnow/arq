name: Deploy ARQ to Beget Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/arq

            echo "=== Starting ARQ Autonomous Deployment ==="

            # 1. Умное обновление кода
            git fetch origin --depth 1
            git reset --hard origin/main

            # 2. Оптимизированная установка зависимостей
            # Устанавливаем только если изменился package-lock.json
            if [ -f "package-lock.json" ]; then
              npm ci --prefer-offline --no-audit
            else
              npm install --prefer-offline --no-audit
            fi

            # 3. Сборка (Build)
            echo "Building application..."
            npm run build

            # 4. Проверка целостности перед перезапуском
            if [ ! -f "dist/main.js" ]; then
              echo "❌ ERROR: Build failed"
              exit 1
            fi

            # 5. Синхронизация фронтенда
            mkdir -p dist/frontend
            if [ -d "src/frontend/dist" ]; then
              cp -r src/frontend/dist/* dist/frontend/
            fi

            # 6. Безопасный перезапуск через PM2 (Graceful Reload)
            # Вместо delete/start используем reload, чтобы не было простоя
            pm2 reload arq-backend --update-env || pm2 start dist/main.js --name arq-backend

            # 7. Автономный Health Check
            echo "Running health check..."
            # Используем гибкий поиск пути здоровья
            HEALTH_URL=$(grep -o "/api/v[0-9]/health" dist/main.js | head -n 1 || echo "/api/v1/health")
            
            SUCCESS=0
            for i in {1..10}; do
              if curl -sf "http://localhost:8000$HEALTH_URL" > /dev/null; then
                echo "✅ ARQ is Online (Path: $HEALTH_URL)"
                SUCCESS=1
                break
              fi
              echo "⏳ Waiting for ARQ... ($i/10)"
              sleep 3
            done

            if [ $SUCCESS -eq 0 ]; then
              echo "❌ Health check failed. Rolling back logs:"
              pm2 logs arq-backend --lines 20 --nostream
              exit 1
            fi
