name: Deploy ARQ to Beget Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/arq
            echo 'Starting deployment...'
            git stash
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            npm install --production=false
            npm rebuild
                        npm cache clean --force
            npm run build
            npm run build:frontend
            sleep 2
            pnpm start dist/main.js --name "arq-backend" --cwd /opt/arq
            pnpm save
            sudo systemctl reload nginx
            pnpm logs arq-backend --lines 20 --nstream
            echo "=== Backend Health Check ==="
            curl -f http://localhost:8888 || echo "Backend not responding"
            echo "=== Nginx Config Check ==="
            nginx -t || echo "Nginx config invalid"
            echo "=== Nginx Error Log (last 10 lines) ==="
            tail -10 /var/log/nginx/error.log || echo "Cannot read nginx error log"
            echo "=== Deployment completed!"
