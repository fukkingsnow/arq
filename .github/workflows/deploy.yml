name: Deploy ARQ to Beget Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install --ignore-scripts
      
      - name: Build application
        run: |
          rm -rf dist
          npx nest build
      
      - name: Deploy via SSH and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/arq
            git pull origin main
            npm install --ignore-scripts
            npm run build
            npm restart || npm start
            echo "✅ ARQ deployment completed successfully"
      
      - name: Notify deployment status
        if: success()
        run: echo "🚀 ARQ deployed successfully to ${{ secrets.SERVER_HOST }}"
      
      - name: Notify deployment failure
        if: failure()
        run: echo "❌ ARQ deployment failed"
