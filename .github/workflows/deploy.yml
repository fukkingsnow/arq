name: Deploy ARQ to Beget Server
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code (shallow clone for speed)
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          cd /opt/arq
          echo "=== Starting deployment ==="
          
          # Kill existing processes
          echo "Stopping old processes..."
          pm2 delete arq-backend 2>/dev/null || true
          fuser -k 8000/tcp 2>/dev/null || true
          
          # Update repository (shallow clone already used above)
          echo "Fetching updates..."
          git fetch origin --depth 1
          git reset --hard origin/main
          
          # Clean and install dependencies optimized
          echo "Installing dependencies..."

          
          # Verify build output
          if [ ! -f "dist/main.js" ]; then
            echo "❌ ERROR: Build failed - dist/main.js not found"
            exit 1
          fi
          echo "✅ Build successful"
          ls -lh /opt/arq/dist/main.js
           
            # Copy frontend static files
            echo "Copying frontend files..."
            mkdir -p /opt/arq/dist/frontend
            cp -r src/frontend/dist/* /opt/arq/dist/frontend/ || true
            echo "✅ Frontend files copied successfully!"
          
          # Start application
          echo "Starting application..."
                    mkdir -p logs
            pm2 restart arq-backend || pm2 start ecosystem.config.js
                      if [ $? -ne 0 ]; then
                                  echo "❌ Failed to start application"
                                              exit 1
                                                        fi
          # Reload nginx
          echo "Reloading nginx..."
          sudo systemctl reload nginx || true
          
          # Enhanced health check with diagnostics
 echo "Waiting for application to start..."
 MAX_RETRIES=15
 RETRY_COUNT=0
 sleep 5
 
 while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
   RETRY_COUNT=$((RETRY_COUNT + 1))
   if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
     echo "✅ Health check passed on attempt $RETRY_COUNT"
     break
   fi
   if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
     echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - waiting..."
     sleep 3
   else
     echo "⚠️  Health check failed after $MAX_RETRIES attempts"
     echo "=== PM2 Status ==="
     pm2 list || true
     echo "=== Application Logs (last 30 lines) ==="
     pm2 logs arq-backend --lines 30 || true
   fi
 done    fi
            fi
          done
          
          # Show application status
          echo ""
          echo "=== Application Status ==="
          pm2 list
          
          echo ""
          echo "✅ Deployment completed successfully!"
          echo "App URL: http://arq-ai.ru"
          echo "============================"
