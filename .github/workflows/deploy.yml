name: Deploy ARQ to Beget Server
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH and restart with PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/arq || { echo 'ERROR: Cannot cd to /opt/arq'; exit 1; }
            echo '=== Step 1: Git operations ==='
            git stash || true
            git pull origin main || { echo 'ERROR: Git pull failed'; exit 1; }
            echo '=== Step 2: Installing dependencies ==='
            npm install || { echo 'ERROR: npm install failed'; exit 1; }
            echo '=== Step 3: Running npm audit fix ==='
            npm audit fix --force || true
            echo '=== Step 4: Building application ==='
            echo 'Running: npx nest build'
            npx nest build --debug 2>&1 || { echo 'ERROR: npm run build failed'; exit 1; }
            echo 'Build command completed'
            echo 'Checking build output...'
            ls -la dist/ 2>&1 || echo 'dist directory not found'
            echo '=== Step 5: Verifying build output ==='
            if [ ! -f /opt/arq/dist/main.js ]; then
              echo 'ERROR: Build failed - dist/main.js not found!'
              echo 'Files in dist:'
              ls -la /opt/arq/dist/ 2>&1 || echo 'dist directory does not exist'
              echo 'Contents of dist:'  
              find /opt/arq/dist -type f 2>&1 | head -20 || echo 'Cannot find dist files'
              exit 1
            fi
            echo 'Build verified. dist/main.js exists.'
            echo '=== Step 6: Checking PM2 process ==='
            pm2 list || echo 'PM2 has no processes yet'
            echo '=== Step 7: Restarting PM2 process ==='
            if pm2 list | grep -q 'arq-backend'; then
              echo 'Restarting existing PM2 process'
              pm2 restart arq-backend
            else
              echo 'Starting new PM2 process'
              pm2 start /opt/arq/dist/main.js --name "arq-backend" --cwd /opt/arq || { echo 'ERROR: PM2 start failed'; exit 1; }
            fi
            echo '=== Step 8: Saving PM2 state ==='
            pm2 save || { echo 'ERROR: pm2 save failed'; exit 1; }
            echo '=== Step 9: Reloading Nginx ==='
            sudo systemctl reload nginx || { echo 'ERROR: Nginx reload failed'; exit 1; }
            echo '=== Step 10: Verifying PM2 status ==='
            pm2 status
            echo 'Deployment completed successfully!'
      - name: Notify deployment status
        if: success()
        run: echo 'Deployment successful'
      - name: Notify deployment failure
        if: failure()
        run: echo 'Deployment failed'
