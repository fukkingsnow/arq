name: Deploy ARQ to Beget Server
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/arq
            echo "=== Starting deployment ==="
            
            # Kill existing processes
            echo "Stopping old processes..."
            pm2 delete arq-backend 2>/dev/null || true
            fuser -k 8000/tcp 2>/dev/null || true
            
            # Update repository
            echo "Fetching updates..."
            git fetch origin
            git reset --hard origin/main
            
            # Clean and install dependencies
            echo "Installing dependencies..."
            npm cache clean --force --silent || true
            rm -rf package-lock.json
            rm -rf node_modules
            npm install --no-audit --no-fund 2>&1 || npm ci --no-audit --no-fund
            
            # Build application
            echo "Building application..."
 npm run build 2>&1            
            # Start application
            echo "Starting application..."
            pm2 start /opt/arq/dist/main.js --name arq-backend || echo "Failed to start app"
            pm2 save
            
            # Reload nginx
            echo "Reloading nginx..."
            sudo systemctl reload nginx || true
            
            # Health check
            echo "Running health check..."
            sleep 3
            curl -f http://localhost:8000/health || echo "Health check failed, but continuing"
            
            echo "=== Deployment completed ==="
