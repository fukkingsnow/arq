name: Deploy ARQ to Beget

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install --ignore-scripts
        
      - name: Build application
        run: |
          rm -rf dist
          npx nest build
        
      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json package-lock.json .env.example deploy/
          cp -r src deploy/
          cp -r node_modules deploy/
          
      - name: Upload to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.BEGET_FTP_SERVER }}
          username: ${{ secrets.BEGET_FTP_USER }}
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /api.arqio.ru/public_html/
          state-name: .ftp-deploy-sync-state.json
          
      - name: Restart application on Beget
        run: |
          echo "Build and deployment completed successfully"
          echo "Restarting application..."
