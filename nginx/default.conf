server {
    listen 80;
    server_name arq-ai.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name arq-ai.ru;

    ssl_certificate /etc/letsencrypt/live/arq-ai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arq-ai.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/arq/ {
        rewrite ^/api/v1/arq/(.*) /api/v1/$1 break;
        proxy_pass http://arq:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://arq:8000;
        proxy_set_header Host $host;
    }

    location /api/ai/ {
        rewrite ^/api/ai/(.*) /$1 break;
        proxy_pass http://arq-ollama:11434;
        proxy_set_header Host $host;
    }
}
