<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARQ - Task Management Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .main-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .header { margin-bottom: 25px; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; }
    .header h1 { color: #1f2937; font-size: 28px; margin-bottom: 8px; }
    .header h2 { color: #1f2937; font-size: 24px; margin-bottom: 8px; }
    .header p { color: #6b7280; font-size: 14px; }
    .status-online { color: #10b981; font-weight: 600; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border 0.2s; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-create, .btn-primary, .btn-secondary { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    .btn-create { background: #667eea; color: white; flex: 1; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn-create:hover, .btn-primary:hover, .btn-secondary:hover { opacity: 0.9; transform: translateY(-1px); }
    .task-item { background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #667eea; }
    .task-item h3 { color: #1f2937; margin-bottom: 5px; font-size: 16px; }
    .task-item p { color: #6b7280; font-size: 14px; margin-bottom: 5px; }
    .task-status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-running { background: #dbeafe; color: #1e40af; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-failed { background: #fee2e2; color: #991b1b; }
    .empty-message { text-align: center; color: #9ca3af; padding: 40px 20px; }
    .error-message, .success-message { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; }
    .error-message { background: #fee2e2; color: #991b1b; }
    .success-message { background: #d1fae5; color: #065f46; }
    @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="panel">
      <div class="header">
        <h1>🚀 ARQ Task Creator</h1>
        <p>Create and submit development tasks</p>
        <p class="status-online">✓ Service Online</p>
      </div>
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>
      <form id="taskForm">
        <div class="form-group">
          <label for="goal1">Development Goal #1</label>
          <input type="text" id="goal1" placeholder="e.g., Implement API endpoint" value="Conduct comprehensive system analysis">
        </div>
        <div class="form-group">
          <label for="goal2">Development Goal #2</label>
          <input type="text" id="goal2" placeholder="e.g., Add unit tests" value="Verify deployment pipeline functionality">
        </div>
        <div class="form-group">
          <label for="goal3">Development Goal #3</label>
          <input type="text" id="goal3" placeholder="e.g., Update documentation" value="Generate performance metrics report">
        </div>
        <div class="form-group">
          <label for="maxIterations">Max Iterations</label>
          <input type="number" id="maxIterations" value="5" min="1" max="20">
        </div>
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="button-group">
          <button type="submit" class="btn-create">📤 Submit Task</button>
        </div>
      </form>
    </div>
    <div class="panel">
      <h2>📋 Active Tasks</h2>
      <div class="button-group" style="margin-bottom: 20px;">
        <button class="btn-primary" onclick="loadTasks()">🔄 Refresh</button>
      </div>
      <div id="tasksList" class="empty-message">Loading tasks...</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
