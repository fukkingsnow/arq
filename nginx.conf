server {
    listen 80;
    server_name arq-ai.ru www.arq-ai.ru;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name arq-ai.ru www.arq-ai.ru;

    ssl_certificate /etc/letsencrypt/live/arq-ai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arq-ai.ru/privkey.pem;

    # Исправляем пути API на лету
    location ~ ^/api/v1/arq/(.*)$ {
        proxy_pass http://arq:8000/api/v1/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Стандартный путь API
    location /api/v1/ {
        proxy_pass http://arq:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Portainer (Управление)
    location /manage/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://169ad30ca9dd:9000/;
        proxy_set_header Host $host;
    }

    # Фронтенд (если он не в докере, пробуем направить на статику или локальный порт)
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Если Vite упал, отдаем ошибку красиво
        proxy_intercept_errors on;
        error_page 502 = @fallback;
    }
}
