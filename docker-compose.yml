version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: arq_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-arq_db}
      POSTGRES_USER: ${DB_USER:-arquser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arqpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquser -d arq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: arq_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ARQ Backend API
  arq_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arq_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-arquser}:${DB_PASSWORD:-arqpass123}@postgres:5432/${DB_NAME:-arq_db}
      REDIS_URL: redis://redis:6379
      DEBUG: ${DEBUG:-False}
      HOST: 0.0.0.0
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - arq_network

volumes:
  postgres_data:
  redis_data:

networks:
  arq_network:
    driver: bridge
