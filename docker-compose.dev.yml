version: '3.8'

services:
  arq:
    build:
      context: .
      dockerfile: deployment/Dockerfile.prod
    container_name: arq
    user: "0:0"
    env_file:
      - .env
    ports:
      - "3000:8000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=debug
      - API_PORT=8000
      - DATABASE_URL=postgresql://arq:${DB_PASSWORD}@arq-postgres:5432/arq
      - REDIS_URL=redis://arq-redis:6379
      - OLLAMA_URL=http://arq-ollama:11434
      - OLLAMA_MODEL=gemma2:2b
      - ASSISTANT_MODEL=gemma2:2b
    volumes:
      - ./data/arq-storage:/tmp/arq_data
      # Автоматический проброс фронтенда в контейнер
      - ./dist/frontend:/app/dist/frontend
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/v1/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:14-alpine
    container_name: arq-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=arq
      - POSTGRES_USER=arq
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arq -d arq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arq-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: arq-ollama
    networks:
      default:
        aliases:
          - ollama
    volumes:
      - ./data/ollama:/root/.ollama
    restart: always

networks:
  default:
    name: arq-network
