version: '3.8'

services:
  arq-gateway:
    image: nginx:stable-alpine
    container_name: arq-gateway
    restart: always  # Важно: он будет перезапускаться, пока не найдет 'arq'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/frontend/dist:/usr/share/nginx/html:ro
      - ./arq-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - arq-network
    depends_on:
      - arq

  arq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arq
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=arq-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password  # Совпадает с postgres ниже
      - DB_DATABASE=arq
    networks:
      - arq-network
    depends_on:
      - arq-postgres

  arq-postgres:
    image: postgres:15-alpine
    container_name: arq-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password  # Совпадает с arq выше
      POSTGRES_DB: arq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arq-network

  arq-ollama:
    image: ollama/ollama
    container_name: arq-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - arq-network

networks:
  arq-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
