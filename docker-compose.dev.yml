version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arq-postgres-dev
    environment:
      POSTGRES_USER: arq_dev
      POSTGRES_PASSWORD: arq_dev_password
      POSTGRES_DB: arq_development
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - arq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arq_dev -d arq_development"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: arq-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - arq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  arq-network:
    driver: bridge
