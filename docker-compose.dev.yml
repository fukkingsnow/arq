version: '3.8'

services:
  arq-gateway:
    image: nginx:stable-alpine
    container_name: arq-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src/frontend:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - arq
    networks:
      - arq-network

  arq:
    container_name: arq
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=development
    networks:
      - arq-network

  arq-ollama:
    image: ollama/ollama
    container_name: arq-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - arq-network

networks:
  arq-network:
    driver: bridge

volumes:
  ollama_data:
