version: '3.8'

services:
  arq:
    build:
      context: .
      dockerfile: deployment/Dockerfile.prod
    container_name: arq-api
    user: "1000:1000" # Запуск от пользователя с правами на запись
    ports:
      - "3000:8000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=debug
      - API_PORT=8000
      - DATABASE_URL=postgresql://arq:${DB_PASSWORD}@arq-postgres:5432/arq
      - REDIS_URL=redis://arq-redis:6379
      - OLLAMA_BASE_URL=http://arq-ollama:11434
      - OLLAMA_MODEL=gemma2:2b
      - ASSISTANT_MODEL=gemma2:2b
    volumes:
      # Мапим хранилище для того самого JSON и логов
      - ./data/arq-storage:/tmp/arq_data
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:14-alpine
    container_name: arq-postgres
    environment:
      - POSTGRES_DB=arq
      - POSTGRES_USER=arq
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arq -d arq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arq-redis
    volumes:
      - ./data/redis:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: arq-ollama
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - default
    restart: always

networks:
  default:
    name: arq-network
