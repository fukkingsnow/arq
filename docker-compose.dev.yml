version: '3.8'

services:
  arq:
    build:
      context: .
      dockerfile: deployment/Dockerfile.prod
    container_name: arq-api
    image: arq:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://arq:${DB_PASSWORD}@postgres:5432/arq
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretchangeit}
      - API_PORT=3000
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - arq-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:14-alpine
    container_name: arq-postgres
    environment:
      - POSTGRES_DB=arq
      - POSTGRES_USER=arq
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - arq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arq -d arq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arq-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - arq-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Добавляем "Младшего" прямо в связку
  ollama:
    image: ollama/ollama:latest
    container_name: arq-ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - arq-network
    restart: always

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ollama-data:
    driver: local

networks:
  arq-network:
    driver: bridge
